name: next_lift
description: Personal cross-platform fitness logging app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.28.1
  drift_flutter: ^0.2.7
  flutter_riverpod: ^2.5.1
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.28.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
